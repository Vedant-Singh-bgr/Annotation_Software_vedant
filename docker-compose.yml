services:
  db:
    image: postgres:16-alpine
    container_name: annotation-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: annotator
      POSTGRES_PASSWORD: annotator
      POSTGRES_DB: annotation
    ports:
      - "5432:5432"
    volumes:
      - annotation_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annotator -d annotation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  annotation_pgdata:
